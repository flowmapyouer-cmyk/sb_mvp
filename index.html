<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세컨부스트 협업 대시보드 MVP</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:'Pretendard','Malgun Gothic',sans-serif;background:#f8fafc;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
  .fade-in{animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .bar-fill{transition:width .5s cubic-bezier(.4,0,.2,1);}
  .toggle-dot{transition:transform .25s ease;}
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-16">

<!-- ============ TOP: 업로드 & 필터 ============ -->
<div class="max-w-7xl mx-auto px-4 pt-6">
  <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
    <div class="flex items-center justify-between mb-3">
      <h1 class="text-lg font-bold tracking-tight flex items-center gap-2">
        세컨부스트 협업 대시보드
      </h1>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <span class="text-xs text-slate-500">🌐 맥락 필터</span>
          <select id="langFilter" class="bg-white border border-slate-300 text-xs rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            <option value="ko">한국어 (기본)</option>
            <option value="en">영어</option>
            <option value="ja">일본어</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-slate-500">🧠 Custom LLM 학습 모드</span>
          <button id="llmToggle" onclick="toggleLLM()" class="w-11 h-6 rounded-full bg-slate-300 relative transition-colors">
            <span id="llmDot" class="toggle-dot absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow"></span>
          </button>
          <span id="llmState" class="text-xs font-semibold text-slate-500">OFF</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
      <div class="md:col-span-2 flex flex-col gap-2">
        <textarea id="inputText" rows="2" placeholder="예) 테크노바 3분기 마케팅 자동화 프로젝트 회의록입니다. 주요 논의사항은..."
          class="w-full bg-white border border-slate-300 rounded-xl p-2.5 text-sm resize-none focus:outline-none focus:ring-1 focus:ring-indigo-500 placeholder:text-slate-400"></textarea>

        <label for="fileInput" id="fileDropzone" class="w-full flex items-center gap-2 bg-slate-50 border border-dashed border-slate-300 rounded-xl px-3 py-2 text-sm text-slate-500 cursor-pointer hover:bg-slate-100 hover:border-indigo-400 transition">
          <span>📎</span>
          <span id="fileLabel" class="flex-1 truncate">문서 파일 업로드 (선택사항) — PDF, DOCX, TXT 등</span>
          <button type="button" id="fileClearBtn" onclick="clearFile(event)" class="hidden text-slate-400 hover:text-red-500 text-xs px-1">✕</button>
        </label>
        <input id="fileInput" type="file" class="hidden" onchange="handleFileSelect(event)">
      </div>
      <div class="flex flex-col gap-2">
        <button onclick="submitData()" id="submitBtn" class="w-full bg-slate-600 hover:bg-slate-500 transition rounded-xl py-2.5 text-sm font-semibold text-white flex items-center justify-center gap-2">
          <span id="submitSpinner" class="hidden animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
          <span id="submitLabel">데이터 전송</span>
        </button>
        <div class="flex items-center rounded-full border border-slate-300 bg-white overflow-hidden">
          <input id="companySearch" type="text" placeholder="고객사 명"
            class="flex-1 min-w-0 bg-transparent px-4 py-2 text-sm focus:outline-none placeholder:text-slate-400">
          <button onclick="searchCompany()" class="shrink-0 bg-slate-900 hover:bg-slate-800 transition w-9 h-9 flex items-center justify-center m-0.5 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <p id="statusMsg" class="text-xs text-slate-500 mt-2 h-4"></p>
  </div>
</div>

<!-- ============ MAIN: 2구역(좌) + 1구역(우) ============ -->
<div id="mainArea" class="max-w-7xl mx-auto px-4 mt-5 hidden fade-in">

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

    <!-- ============ 좌측 1구역: 실무자 진행도 ============ -->
    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold flex items-center gap-2">✅ 실무자 진행도</h2>
        <button onclick="openInfo('staff')" class="w-5 h-5 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs flex items-center justify-center">!</button>
      </div>

      <div class="flex items-center gap-2 mb-3">
        <span class="text-xs text-slate-500">담당자 필터</span>
        <select id="ownerFilter" onchange="renderTasks()" class="bg-white border border-slate-300 text-xs rounded-lg px-2 py-1.5 focus:outline-none">
          <option value="전체">전체</option>
          <option value="PM">PM</option>
          <option value="개발">개발</option>
          <option value="디자인">디자인</option>
        </select>
      </div>

      <div id="taskList" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>

      <div class="bg-slate-50 border border-slate-100 rounded-xl p-4 space-y-3 text-sm mt-4">
        <div>
          <p class="font-semibold text-indigo-600 mb-1">🎯 핵심 액션 아이템</p>
          <ul id="staffActions" class="list-disc list-inside text-slate-600 space-y-1 text-[13px]"></ul>
        </div>
        <div>
          <p class="font-semibold text-amber-600 mb-1">📈 기대 효과</p>
          <ul id="staffEffects" class="list-disc list-inside text-slate-600 space-y-1 text-[13px]"></ul>
        </div>
      </div>
    </div>

    <!-- ============ 우측 2구역: 진행 모니터링 ============ -->
    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold flex items-center gap-2">📊 진행 모니터링</h2>
        <button onclick="openInfo('exec')" class="w-5 h-5 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs flex items-center justify-center">!</button>
      </div>

      <div class="mb-4">
        <div class="flex justify-between text-xs mb-1">
          <span class="text-slate-500">전체 진행률</span>
          <span id="overallPct" class="font-bold text-emerald-600">0%</span>
        </div>
        <div class="w-full h-3 bg-slate-200 rounded-full overflow-hidden">
          <div id="overallBar" class="bar-fill h-full bg-gradient-to-r from-emerald-500 to-emerald-400" style="width:0%"></div>
        </div>
      </div>

      <div class="mb-5">
        <p class="text-xs text-slate-500 mb-2">담당자별 달성도</p>
        <div class="flex gap-2" id="ownerBars"></div>
      </div>

      <div class="bg-slate-50 border border-slate-100 rounded-xl p-4 space-y-3 text-sm">
        <div>
          <p class="font-semibold text-indigo-600 mb-1">🎯 핵심 액션 아이템</p>
          <ul id="execActions" class="list-disc list-inside text-slate-600 space-y-1 text-[13px]"></ul>
        </div>
        <div>
          <p class="font-semibold text-amber-600 mb-1">📈 기대 효과</p>
          <ul id="execEffects" class="list-disc list-inside text-slate-600 space-y-1 text-[13px]"></ul>
        </div>
      </div>
    </div>

  </div>

  <!-- ============ 3구역: 고객사 협의 ============ -->
  <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm mt-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-bold flex items-center gap-2">🤝 고객사 - <span id="companyLabel" class="text-indigo-600"></span></h2>
      <div class="flex items-center gap-2">
        <button onclick="downloadAgreement()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 transition rounded-lg px-3 py-1.5 text-xs font-semibold flex items-center gap-1">⬇️ 협의안 다운로드</button>
        <button onclick="openInfo('client')" class="w-5 h-5 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs flex items-center justify-center">!</button>
      </div>
    </div>
    <textarea id="agreementText" rows="10" class="w-full bg-white border border-slate-300 rounded-xl p-4 text-sm leading-relaxed focus:outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
    <p class="text-xs text-slate-500 mt-2">✏️ 내용을 자유롭게 수정한 뒤 다운로드하면 수정본이 저장됩니다.</p>
  </div>

</div>

<!-- ============ 긴급 케이스 모달 ============ -->
<div id="urgentModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4" onclick="if(event.target===this)closeUrgent()">
  <div class="bg-white border border-red-200 rounded-2xl p-6 max-w-md w-full shadow-xl fade-in">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-bold text-red-600">🚨 긴급 케이스</h3>
      <button onclick="closeUrgent()" class="text-slate-400 hover:text-slate-700 text-lg leading-none">✕</button>
    </div>
    <div id="urgentBody" class="text-sm space-y-2 text-slate-700"></div>
  </div>
</div>

<!-- ============ 04·우선순위 판단 정보 모달 ============ -->
<div id="infoModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4" onclick="if(event.target===this)closeInfo()">
  <div class="bg-white border border-indigo-200 rounded-2xl p-6 max-w-xl w-full shadow-xl fade-in">
    <div class="flex items-center justify-between mb-3">
      <h3 id="infoTitle" class="font-bold text-indigo-600">04 · 우선순위 판단</h3>
      <button onclick="closeInfo()" class="text-slate-400 hover:text-slate-700 text-lg leading-none">✕</button>
    </div>
    <div id="infoBody" class="text-sm space-y-2 text-slate-600 leading-relaxed"></div>
  </div>
</div>

/* ================= FILE UPLOAD ================= */
function handleFileSelect(e){
  const file = e.target.files[0];
  if(!file) return;
  attachedFile = file;
  document.getElementById('fileLabel').textContent = `📄 ${file.name}`;
  document.getElementById('fileClearBtn').classList.remove('hidden');
}

function clearFile(e){
  e.preventDefault();
  attachedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileLabel').textContent = '문서 파일 업로드 (선택사항) — PDF, DOCX, TXT 등';
  document.getElementById('fileClearBtn').classList.add('hidden');
}

/* ================= COMPANY NAME EXTRACTION (rule-based) ================= */
function extractCompanyName(text){
  const known = Object.keys(DB);
  for(const name of known){
    if(text.includes(name)) return name;
  }
  // fallback: look for pattern like 'OOO(주)' or 'OOO 주식회사' or 'OOO사'
  const m = text.match(/([가-힣A-Za-z]{2,10})\s*(주식회사|㈜|\(주\))/);
  if(m) return m[1];
  return known[0]; // default
}

/* ================= SUBMIT ================= */
let firstSubmitDone = false;
function runSubmit(combinedText){
  const spinner = document.getElementById('submitSpinner');
  const label = document.getElementById('submitLabel');
  spinner.classList.remove('hidden');
  label.textContent = '분석 중...';
  setStatus(attachedFile ? '텍스트와 첨부파일에서 고객사 정보를 추출하고 있습니다...' : '고객사 정보를 추출하고 있습니다...');

  setTimeout(()=>{
    spinner.classList.add('hidden');
    label.textContent = '📤 데이터 전송';
    const name = extractCompanyName(combinedText);
    document.getElementById('companySearch').value = name;
    setStatus(`✅ '${name}' 고객사로 자동 인식되었습니다.`);
    loadCompany(name);
    if(!firstSubmitDone){
      document.getElementById('mainArea').classList.remove('hidden');
      firstSubmitDone = true;
    }
  }, 1000);
}

function submitData(){
  const text = document.getElementById('inputText').value.trim();
  if(!text && !attachedFile){ setStatus('텍스트를 입력하거나 파일을 첨부해주세요.'); return; }

  if(attachedFile){
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const fileText = (typeof ev.target.result === 'string') ? ev.target.result : '';
      runSubmit(text + ' ' + attachedFile.name + ' ' + fileText);
    };
    reader.onerror = ()=> runSubmit(text + ' ' + attachedFile.name);
    reader.readAsText(attachedFile);
  } else {
    runSubmit(text);
  }
}

function searchCompany(){
  const q = document.getElementById('companySearch').value.trim();
  if(!q){ setStatus('고객사명을 입력해주세요.'); return; }
  const match = Object.keys(DB).find(n=>n===q) || Object.keys(DB).find(n=>n.includes(q));
  if(!match){ setStatus(`⚠️ '${q}' 고객사 데이터를 찾을 수 없습니다.`); return; }
  loadCompany(match);
  document.getElementById('mainArea').classList.remove('hidden');
  setStatus(`✅ '${match}' 데이터로 화면이 갱신되었습니다.`);
}

function setStatus(msg){ document.getElementById('statusMsg').textContent = msg; }

/* ================= LOAD COMPANY ================= */
function loadCompany(name){
  currentCompany = JSON.parse(JSON.stringify(DB[name])); // deep clone for editable state
  document.getElementById('companyLabel').textContent = name;
  document.getElementById('ownerFilter').value = '전체';
  renderTasks();
  renderProgress();
  renderExecContent();
  renderStaffContent();
  document.getElementById('agreementText').value = currentCompany.agreement;
}

/* ================= TASK LIST (1구역) ================= */
function renderTasks(){
  const filter = document.getElementById('ownerFilter').value;
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  currentCompany.tasks
    .filter(t => filter==='전체' || t.owner===filter)
    .forEach(t=>{
      const row = document.createElement('div');
      row.className = 'flex items-center gap-2 bg-slate-50 border border-slate-100 rounded-lg px-3 py-2 text-sm';
      row.innerHTML = `
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id}, this.checked)"
          class="w-4 h-4 accent-emerald-500 shrink-0 cursor-pointer">
        <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-slate-200 text-slate-600 shrink-0">${t.owner}</span>
        <span class="flex-1 ${t.done?'line-through text-slate-400':'text-slate-700'}">${t.text}</span>
        ${t.urgent ? `<button onclick='showUrgent(${JSON.stringify(t.case).replace(/'/g,"&apos;")})' class="text-[10px] px-2 py-1 rounded-full bg-red-600/90 hover:bg-red-500 text-white shrink-0 font-semibold">🚨 긴급건</button>` : ''}
      `;
      list.appendChild(row);
    });
}

function toggleTask(id, checked){
  const t = currentCompany.tasks.find(t=>t.id===id);
  t.done = checked;
  renderProgress();
}

/* ================= PROGRESS (2구역) ================= */
function renderProgress(){
  const tasks = currentCompany.tasks;
  const overall = Math.round(tasks.filter(t=>t.done).length / tasks.length * 100);
  document.getElementById('overallPct').textContent = overall + '%';
  document.getElementById('overallBar').style.width = overall + '%';

  const owners = ["PM","개발","디자인"];
  const colors = {PM:'from-indigo-500 to-indigo-400', 개발:'from-sky-500 to-sky-400', 디자인:'from-fuchsia-500 to-fuchsia-400'};
  const wrap = document.getElementById('ownerBars');
  wrap.innerHTML = '';
  owners.forEach(o=>{
    const list = tasks.filter(t=>t.owner===o);
    const pct = list.length ? Math.round(list.filter(t=>t.done).length/list.length*100) : 0;
    const block = document.createElement('div');
    block.className = 'flex-1 min-w-0';
    block.innerHTML = `
      <div class="flex justify-between text-[11px] mb-1">
        <span class="text-slate-500">${o}</span>
        <span class="font-semibold text-slate-700">${pct}%</span>
      </div>
      <div class="w-full h-2.5 bg-slate-200 rounded-full overflow-hidden">
        <div class="bar-fill h-full bg-gradient-to-r ${colors[o]}" style="width:${pct}%"></div>
      </div>`;
    wrap.appendChild(block);
  });
}

/* ================= URGENT MODAL ================= */
function showUrgent(c){
  document.getElementById('urgentBody').innerHTML = `
    <p><span class="text-slate-500">케이스 번호 | 제목</span><br><b>${c.no} | ${c.title}</b></p>
    <p><span class="text-slate-500">한줄 요약</span><br>${c.summary}</p>
    <p><span class="text-slate-500">비즈니스 맥락</span><br>${c.context}</p>
    <p><span class="text-slate-500">미결</span><br>⚠️ ${c.pending}</p>
  `;
  const modal = document.getElementById('urgentModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
}
function closeUrgent(){
  const modal = document.getElementById('urgentModal');
  modal.classList.add('hidden'); modal.classList.remove('flex');
}

/* ================= INFO MODAL ================= */
function openInfo(key){
  const data = INFO_CONTENT[key];
  document.getElementById('infoTitle').textContent = data.title;
  document.getElementById('infoBody').innerHTML = data.body;
  const modal = document.getElementById('infoModal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
}
function closeInfo(){
  const modal = document.getElementById('infoModal');
  modal.classList.add('hidden'); modal.classList.remove('flex');
}

/* ================= LLM TOGGLE ================= */
let llmOn = false;
function toggleLLM(){
  llmOn = !llmOn;
  const dot = document.getElementById('llmDot');
  const btn = document.getElementById('llmToggle');
  const state = document.getElementById('llmState');
  if(llmOn){
    dot.style.transform = 'translateX(20px)';
    btn.classList.add('bg-indigo-600'); btn.classList.remove('bg-slate-300');
    state.textContent = 'ON'; state.classList.add('text-indigo-600'); state.classList.remove('text-slate-500');
  } else {
    dot.style.transform = 'translateX(0)';
    btn.classList.remove('bg-indigo-600'); btn.classList.add('bg-slate-300');
    state.textContent = 'OFF'; state.classList.remove('text-indigo-600'); state.classList.add('text-slate-500');
  }
}

/* ================= DOWNLOAD AGREEMENT ================= */
function downloadAgreement(){
  const text = document.getElementById('agreementText').value;
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentCompany.company}_협의안.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
